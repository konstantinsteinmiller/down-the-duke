name: Deploy Static Content to Pages

# Builds the GDevelop HTML5 export (game-src → bundled IIFE → game-current.json
# → gdexport → dist/) and publishes dist/ to GitHub Pages. Because the repo is
# named `down-the-duke`, the published site lives at
#   https://<user>.github.io/down-the-duke/
# which is the URL the user wanted to deploy under. dist/index.html uses
# purely relative asset paths, so it works at that subpath without any
# rewriting.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # No `version:` here — pnpm/action-setup@v4 reads `packageManager`
        # from package.json (currently pnpm@10.30.3) and stays in sync.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.8.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build game (bundle + gdexport HTML5)
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
